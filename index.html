<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EREAL BOXSER Shop</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+Thai:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#home" aria-label="กลับหน้าหลัก"><span class="brand-main">EREAL</span><span>BOXSER</span></a>
    <nav class="top-actions">
      <button class="pill user-pill"><span class="avatar">🥊</span><span id="username">cvoppy</span></button>
      <button id="logoutBtn" class="pill">ออกจากระบบ</button>
      <a href="#cart" class="icon-btn" aria-label="ตะกร้าสินค้า">🛒<b id="cartBadge" class="badge hidden">0</b></a>
      <button id="themeToggle" class="icon-btn" aria-label="สลับธีม">☼</button>
    </nav>
  </header>

  <main>
    <section id="home" class="page active">
      <div class="hero-wrap">
        <button id="prevHero" class="slide-btn left" aria-label="ก่อนหน้า">←</button>
        <div class="hero-card" id="heroCard"></div>
        <button id="nextHero" class="slide-btn right" aria-label="ถัดไป">→</button>
      </div>

      <section class="stats-grid" aria-label="สถิติร้านค้า">
        <article class="stat-box"><small>ผู้ใช้งานทั้งหมด</small><strong>ผู้ใช้งานทั้งหมด <span>4K</span></strong></article>
        <article class="stat-box"><small>ผู้ใช้งานวันนี้</small><strong>ผู้ใช้งานวันนี้ <span>1.3K</span></strong></article>
        <article class="stat-box"><small>ยอดซื้อทั้งหมด</small><strong>ยอดซื้อทั้งหมด <span>10K</span></strong></article>
        <article class="stat-box"><small>ยอดขายวันนี้</small><strong>ยอดขายวันนี้ <span>420</span></strong></article>
      </section>

      <section id="productGrid" class="product-grid" aria-label="รายการสินค้า"></section>
    </section>

    <section id="topup" class="page narrow-page">
      <h1 class="page-title">💳 เติมเงินและเพิ่มแต้ม</h1>
      <div class="topup-card">
        <input id="topupCode" class="field" placeholder="ลิงค์อั่งเปาๆ" />
        <button id="topupBtn" class="pill primary">เติมเงิน</button>
      </div>
      <p id="walletText" class="wallet-text">ยอดเงินคงเหลือ ฿0.00</p>
    </section>

    <section id="orders" class="page">
      <h1 class="page-title">รายการคำสั่งซื้อ</h1>
      <div id="ordersList" class="orders-list"></div>
    </section>

    <section id="cart" class="page">
      <h1 class="page-title">ตะกร้าสินค้า</h1>
      <div id="cartList" class="cart-list"></div>
      <div class="cart-summary">
        <strong>ราคารวมทั้งหมด <span id="cartTotal">฿ 0.00</span></strong>
        <button id="checkoutBtn" class="pill primary">🧾 สั่งซื้อทั้งหมด</button>
      </div>
      <div class="bottom-links">
        <a class="soft-link" href="#topup">🐷 เติมเงิน</a>
        <a class="pill" href="#orders">💬 คำสั่งซื้อ</a>
      </div>
    </section>
  </main>

  <div id="productModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-panel">
      <button id="closeModal" class="modal-close" aria-label="ปิด">×</button>
      <img id="modalImg" class="modal-img" alt="">
      <h2 id="modalTitle"></h2>
      <p id="modalDesc"></p>
      <div class="modal-line"><strong id="modalPrice"></strong><span id="modalStock"></span></div>
      <div class="buy-row">
        <input id="modalQty" class="field" type="number" min="1" value="1" />
        <button id="addCartBtn" class="pill">🛒 หยิบใส่ตะกร้า</button>
        <button id="buyNowBtn" class="pill">☑ สั่งซื้อ</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="app.js" defer></script>
</body>
</html>
